<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabalhando com imagens</title>
    <style>
        img {
            width: 500px;
        }
    </style>
</head>
<body>
    <h1>Trabalho com imagens</h1>
    <h2>Imagem Bitmap</h2>
    <img src="imagens/logo-sem-fundo.png" alt="Logo menos nítida">
    <h2>Imagem Vetorial</h2>
    <img src="imagens/logo-sem-fundo.svg" alt="Logo mais nítida">
    <h2>Imagem Bitmap de gif animado</h2>
    <img src="imagens/gif-animado.gif" alt="imagem com um gif animado de personagem do Simpsons correndo.">
    
</body>
</html>
